<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav>
            <a href="credits.html">Credits</a>
            <a href="help.html">Help</a>
        </nav>
        <h1>Settings - Session Management</h1>
        <div id="session-list">
            <!-- Sessions will be populated here -->
        </div>

        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--border);">

        <section id="import-export">
            <h2>Import / Export</h2>
            <p style="font-size: 0.9rem; color: #aaa;">Copy your sessions as JSON for backup or to move them to another machine.</p>
            <textarea id="io-area" style="width: 100%; height: 150px; background: var(--surface); color: var(--fg); border: 1px solid var(--border); padding: 0.5rem; font-family: monospace;"></textarea>
            <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem;">
                <button id="export-btn">Export to Text Box</button>
                <button id="copy-btn">Copy to Clipboard</button>
                <button id="import-btn">Import from Text Box</button>
            </div>
        </section>

        <script src="../scripts/settings.js" type="module"></script>
    </body>
</html>
