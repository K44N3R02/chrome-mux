<html>
    <head>
        <style>
            body { width: 300px; padding: 10px; }
            input { width: 100%; box-sizing: border-box; padding: 8px; }
            ul { list-style: none; padding: 0; margin-top: 10px; }
            li { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee }
        </style>
    </head>
    <body>
        <h1 id="heading">Chrome Mux</h1>
        <form id="search-form">
            <input type="text" id="search" autofocus autocomplete="off">
        </form>
        <ul id="search-results"></ul>
        <button id="save-button">Save</button>
        <button id="load-button">Load</button>
        <button id="load-wo-save-button">Load without saving</button>
        <button id="quick-switch-button">Quick switch</button>
        <button id="show-button">Show</button>
        <script src="../scripts/popup.js" type="module"></script>
    </body>
</html>
